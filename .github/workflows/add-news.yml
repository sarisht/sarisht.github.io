name: Add News

# Click "Run workflow", fill the form, and this opens a PR adding the item to
# data/news.yaml. Merge the PR to publish. No server required.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD)"
        required: true
      text:
        description: "News text (markdown allowed, e.g. *Paper* accepted at X)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  add-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append news item to data/news.yaml
        env:
          NEWS_DATE: ${{ inputs.date }}
          NEWS_TEXT: ${{ inputs.text }}
        run: |
          python3 -m pip install --quiet pyyaml || true
          python3 - <<'PY'
          import os, json, yaml
          from datetime import datetime
          raw = os.environ["NEWS_DATE"].strip()
          dt = None
          for fmt in ("%Y-%m-%d", "%Y/%m/%d", "%m/%d/%Y"):
              try: dt = datetime.strptime(raw, fmt); break
              except ValueError: pass
          if dt is None:
              raise SystemExit(f"Could not parse date '{raw}'. Use YYYY-MM-DD.")
          date = dt.strftime("%Y-%m-%d")  # always zero-padded, so the site build never breaks
          text = os.environ["NEWS_TEXT"].strip()
          path = "data/news.yaml"
          content = open(path).read()
          yaml.safe_load(content)  # validate current file
          if not content.endswith("\n"):
              content += "\n"
          # json.dumps gives a safe double-quoted scalar valid in YAML too.
          content += f"  - date: '{date}'\n    text: {json.dumps(text, ensure_ascii=False)}\n"
          yaml.safe_load(content)  # validate result
          open(path, "w").write(content)
          print("Added:", date, "-", text)
          PY

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "news: add ${{ inputs.date }}"
          title: "Add news (${{ inputs.date }})"
          body: |
            Adds a news item via the **Add News** workflow.

            - **date:** ${{ inputs.date }}
            - **text:** ${{ inputs.text }}

            Review the diff and merge to publish.
          branch: add-news-${{ github.run_id }}
          delete-branch: true
          labels: content
