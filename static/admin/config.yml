# Decap CMS configuration.
# Docs: https://decapcms.org/docs/
#
# IMPORTANT: set `base_url` below to your deployed Cloudflare Worker URL
# (the OAuth broker). See tools/decap-oauth-worker.js for deploy steps.

backend:
  name: github
  repo: sarisht/sarisht.github.io
  branch: main
  # OAuth broker (Cloudflare Worker). Replace with your worker's URL:
  base_url: https://REPLACE-WITH-YOUR-WORKER.workers.dev
  auth_endpoint: auth

# Where uploaded images/files go (matches the site's static/uploads).
media_folder: static/uploads
public_folder: /uploads

# Edit straight to main (no draft PRs). Set to "editorial_workflow" if you
# prefer review-before-publish.
publish_mode: simple

collections:
  # ---------------------------------------------------------------------------
  # NEWS  ->  data/news.yaml  (single source for the homepage News section)
  # ---------------------------------------------------------------------------
  - name: news
    label: News
    label_singular: News file
    files:
      - name: news_items
        label: News items
        file: data/news.yaml
        description: >-
          The homepage shows the 7 most recent; "Load more" reveals the rest.
          Items are sorted by date automatically, so order here does not matter.
        fields:
          - label: Items
            name: items
            widget: list
            label_singular: News item
            summary: "{{fields.date}} — {{fields.text}}"
            fields:
              - label: Date
                name: date
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                picker_utc: true
              - label: Text
                name: text
                widget: string
                hint: "Markdown allowed, e.g. *Italic paper title*."

  # ---------------------------------------------------------------------------
  # TALKS  ->  content/event/<slug>/index.md  (page bundles)
  # ---------------------------------------------------------------------------
  - name: talks
    label: Talks
    label_singular: Talk
    folder: content/event
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    format: yaml-frontmatter
    extension: md
    slug: "{{slug}}"
    summary: "{{fields.date}} — {{title}}"
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Event / Venue, name: event, widget: string }
      - { label: Event URL, name: event_url, widget: string, required: false, default: "" }
      - { label: Location, name: location, widget: string, required: false, default: "" }
      - { label: Summary, name: summary, widget: string, required: false, default: "" }
      - { label: Abstract, name: abstract, widget: text, required: false, default: "" }
      - { label: Start, name: date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", picker_utc: true }
      - { label: End, name: date_end, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", picker_utc: true, required: false }
      - { label: All day, name: all_day, widget: boolean, default: false, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - { label: Video URL, name: url_video, widget: string, required: false, default: "" }
      - { label: Slides URL, name: url_slides, widget: string, required: false, default: "" }
      - { label: PDF URL, name: url_pdf, widget: string, required: false, default: "" }
      - { label: Code URL, name: url_code, widget: string, required: false, default: "" }
      - { label: Authors, name: authors, widget: list, default: [admin] }
      - { label: Tags, name: tags, widget: list, required: false, default: [] }
      - { label: Body, name: body, widget: markdown, required: false }
